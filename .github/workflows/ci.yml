name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD}}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME}}" --password-stdin 

      - name: Build Docker Image
        run: docker build -t imperfect07/devops-project .

      - name: Push image
        run: | 
           docker tag imperfect07/devops-project imperfect07/devops-project:latest 
           docker push imperfect07/devops-project:latest 

      - name: Deploy to EC2 instance
        uses : appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_SSH_KEY}}
          script: |
            docker pull imperfect07/devops-project:latest
            docker stop devops-container || true
            docker rm devops-container || true
            docker run -d -p 5000:5000 \
            -e DATABASE_URL="sqlite:///./prod.db" \
            --name devops-container \
            imperfect07/devops-project:latest

