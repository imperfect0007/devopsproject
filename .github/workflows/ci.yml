name: DevOps CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check app/

      - name: Run tests
        run: |
          pip install pytest httpx
          cd app && python -m pytest --tb=short || echo "No tests found, skipping"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tags=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t imperfect07/devops-project:${{ github.sha }} -t imperfect07/devops-project:latest .

      - name: Push Docker Image
        run: |
          docker push imperfect07/devops-project:${{ github.sha }}
          docker push imperfect07/devops-project:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull imperfect07/devops-project:${{ github.sha }}
            docker stop devops-container || true
            docker rm devops-container || true
            docker run -d -p 5000:5000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --name devops-container \
              imperfect07/devops-project:${{ github.sha }}
